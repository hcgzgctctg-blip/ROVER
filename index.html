<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoVer</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-content">
            <div class="logo">🚀 RoVer</div>
            <div class="nav-links">
                <a href="#features">Features</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <button class="btn-manage">Manage Server</button>
                <button class="btn-signin">Sign In</button>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="main-content">
            <div class="login-card">
                <h1>Welcome to RoVer</h1>
                <p class="subtitle">Secure Discord server verification</p>
                <button class="btn-discord">
                    <span>🔷</span> Continue with Discord
                </button>
                <div class="divider">or</div>
                <button class="btn-return">Return to RoVer</button>
            </div>
            <div class="logo-center">🛡️</div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="footer-content">
                <div class="footer-section">
                    <h4>About RoVer</h4>
                    <p>Secure verification system for Discord servers</p>
                </div>
                <div class="footer-section">
                    <h4>Quick Links</h4>
                    <a href="#docs">Documentation</a><br>
                    <a href="#support">Support</a><br>
                    <a href="#status">Status</a>
                </div>
                <div class="footer-section">
                    <h4>Community</h4>
                    <a href="#discord">Discord Server</a><br>
                    <a href="#github">GitHub</a><br>
                    <a href="#twitter">Twitter</a>
                </div>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
